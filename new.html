<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Flow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; }
        body { font-family: 'Tajawal', sans-serif; transition: background 0.3s; }
        .dark { background-color: #0f172a; color: #f1f5f9; }
        .light { background-color: #f8fafc; color: #1e293b; }
        
        .card { border-radius: 20px; overflow: hidden; transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.1); }
        .dark .card { background: #1e293b; border-color: #334155; }
        .light .card { background: #ffffff; }
        
        .media-container { display: flex; overflow-x: auto; gap: 8px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .media-container::-webkit-scrollbar { display: none; }
        .media-item { flex: 0 0 100%; scroll-snap-align: start; aspect-ratio: 1/1; position: relative; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="light pb-24">

    <nav class="sticky top-0 z-50 p-4 flex justify-between items-center bg-inherit border-b border-gray-200 dark:border-gray-700">
        <div>
            <h1 class="font-bold text-xl tracking-tight">MEDIA FLOW</h1>
            <span id="syncStatus" class="text-[10px] opacity-50 font-medium">متصل</span>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800">
                <i data-lucide="sun" id="themeIcon"></i>
            </button>
            <button onclick="fetchData()" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        
        <div id="viewSection" class="tab-content active space-y-6">
            <div id="contentContainer" class="grid grid-cols-1 gap-6">
                </div>
        </div>

        <div id="addSection" class="tab-content">
            <div class="card p-6 space-y-4 shadow-xl">
                <h2 class="text-xl font-bold mb-4">منشور جديد</h2>
                <form id="postForm" class="space-y-4">
                    <input type="text" id="productName" placeholder="اسم المنتج/المنشور" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-gray-900 border-none outline-none focus:ring-2 ring-indigo-500" required>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="date" id="date" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-900 border-none outline-none" required>
                        <select id="contentType" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-900 border-none outline-none">
                            <option>ريل</option>
                            <option>بوست</option>
                            <option>ستوري</option>
                        </select>
                    </div>
                    <textarea id="captionDraft" placeholder="الكابشن..." class="w-full p-4 rounded-xl bg-gray-50 dark:bg-gray-900 border-none h-32 outline-none"></textarea>
                    <div class="space-y-2">
                        <label class="text-xs opacity-60">روابط الميديا (افصل بينها بـ |||)</label>
                        <textarea id="mediaUrls" placeholder="رابط 1 ||| رابط 2..." class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-900 border-none h-20 outline-none text-xs"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-xl shadow-lg active:scale-95 transition">إرسال للجدول</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border border-gray-200 dark:border-gray-800 rounded-3xl p-2 flex justify-around shadow-2xl">
        <button onclick="showTab('viewSection')" class="p-3 text-indigo-500 flex flex-col items-center">
            <i data-lucide="layout"></i>
            <span class="text-[10px]">المحتوى</span>
        </button>
        <button onclick="showTab('addSection')" class="p-3 text-gray-400 flex flex-col items-center">
            <i data-lucide="plus-circle"></i>
            <span class="text-[10px]">إضافة</span>
        </button>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxVfPtEk_Rd35yGbvoBpNzrcc1K_D3f3vs73BJtuekHlKnOgefFWV85-XJ6noQG4GIa/exec';
        
        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('light');
            b.classList.toggle('dark');
            const isDark = b.classList.contains('dark');
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'viewSection') fetchData();
        }

        function formatMedia(url) {
            if(!url) return { type: 'img', src: 'https://via.placeholder.com/400?text=No+Media' };
            const id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : (url.includes('d/') ? url.split('d/')[1].split('/')[0] : url.trim());
            
            // تحقق بسيط من نوع الملف عبر الرابط أو افترض فيديو إذا كان الرابط يحتوي كلمات معينة
            const isVideo = url.toLowerCase().includes('.mov') || url.toLowerCase().includes('.mp4');
            
            return {
                type: isVideo ? 'video' : 'img',
                src: isVideo ? `https://drive.google.com/file/d/${id}/preview` : `https://drive.google.com/thumbnail?id=${id}&sz=w800`,
                raw: `https://drive.google.com/file/d/${id}/view`
            };
        }

        async function fetchData() {
            document.getElementById('syncStatus').innerText = "جاري المزامنة...";
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                render(data.reverse());
                document.getElementById('syncStatus').innerText = "تم التحديث";
            } catch(e) { document.getElementById('syncStatus').innerText = "خطأ في الاتصال"; }
        }

        async function updateStatus(rowIndex, newStatus) {
            document.getElementById('syncStatus').innerText = "جاري الحفظ...";
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "updateStatus", row_index: rowIndex, newStatus: newStatus })
                });
                document.getElementById('syncStatus').innerText = "تم الحفظ في الجدول";
            } catch(e) { alert("خطأ في التحديث"); }
        }

        function render(items) {
            const container = document.getElementById('contentContainer');
            container.innerHTML = items.map(item => {
                const mediaList = item.mediaUrls ? item.mediaUrls.split('|||') : [];
                return `
                <div class="card shadow-sm">
                    <div class="media-container">
                        ${mediaList.length > 0 ? mediaList.map(url => {
                            const media = formatMedia(url);
                            return `
                            <div class="media-item">
                                ${media.type === 'video' ? 
                                `<iframe src="${media.src}" class="w-full h-full border-none"></iframe>` : 
                                `<img src="${media.src}" class="w-full h-full object-cover">`}
                                <a href="${media.raw}" target="_blank" class="absolute bottom-2 right-2 bg-black/40 p-2 rounded-full text-white"><i data-lucide="external-link" class="w-4 h-4"></i></a>
                            </div>`;
                        }).join('') : `<div class="media-item"><img src="https://via.placeholder.com/400?text=No+Media" class="w-full h-full object-cover"></div>`}
                    </div>
                    
                    <div class="p-4 space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg leading-tight">${item.productName}</h3>
                                <p class="text-[10px] opacity-50">${item.date} • ${item.contentType}</p>
                            </div>
                            <select onchange="updateStatus(${item.row_index}, this.value)" class="text-xs p-2 rounded-lg bg-gray-100 dark:bg-gray-800 border-none outline-none font-bold">
                                <option ${item.status === 'جديد' ? 'selected' : ''}>جديد</option>
                                <option ${item.status === 'قيد المراجعة' ? 'selected' : ''}>قيد المراجعة</option>
                                <option ${item.status === 'مقبول' ? 'selected' : ''}>مقبول</option>
                                <option ${item.status === 'مرفوض' ? 'selected' : ''}>مرفوض</option>
                            </select>
                        </div>
                        
                        <p class="text-sm opacity-80 whitespace-pre-wrap line-clamp-3">${item.captionDraft || ''}</p>
                        
                        <div class="flex gap-2 pt-2">
                            <button onclick="navigator.clipboard.writeText('${item.captionDraft}')" class="flex-1 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl text-xs font-bold flex justify-center items-center gap-2">
                                <i data-lucide="copy" class="w-3 h-3"></i> نسخ الكابشن
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "جاري الإرسال...";
            
            const payload = {
                productName: document.getElementById('productName').value,
                date: document.getElementById('date').value,
                day: new Date(document.getElementById('date').value).toLocaleDateString('ar-EG', {weekday: 'long'}),
                contentType: document.getElementById('contentType').value,
                captionDraft: document.getElementById('captionDraft').value,
                mediaUrls: document.getElementById('mediaUrls').value,
                responsible: 'فريق السوشال ميديا'
            };

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("تمت الإضافة!");
            document.getElementById('postForm').reset();
            btn.disabled = false; btn.innerText = "إرسال للجدول";
            showTab('viewSection');
        };

        fetchData();
        lucide.createIcons();
    </script>
</body>
</html>
